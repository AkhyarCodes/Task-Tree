<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hierarchical Task Manager</title>
    
    <!-- ADD TAB ICON (FAVICON) HERE -->
    <!-- You can replace the href with a link to your own icon image -->
    <link rel="icon" type="image/png" href="https://is.kzoo.edu/wp-content/uploads/sites/16/2022/06/To-Do_256x256.png">
    
    <!-- Importing Fredoka from Google Fonts for a playful look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* Applying Fredoka font for a rounded, playful feel */
            font-family: 'Fredoka', system-ui, -apple-system, sans-serif;
        }
        
        .task-node {
            position: relative;
        }

        .subtask-container {
            margin-left: 1.5rem;
            padding-left: 1rem;
            border-left: 2px dashed #cbd5e1;
            margin-top: 0.5rem;
            position: relative;
        }

        .connector-line {
            position: absolute;
            left: -1rem;
            top: 1.25rem;
            width: 1rem;
            height: 2px;
            background-color: #cbd5e1;
        }

        .branch-highlight {
            background-color: #f0f9ff;
            border-radius: 1.25rem;
            padding: 6px;
            margin: -6px;
            border: 1px solid #bae6fd;
        }

        .status-doing {
            background-color: #eff6ff;
            border: 2px solid #3b82f6 !important;
            box-shadow: 0 4px 12px -2px rgb(59 130 246 / 0.15);
        }

        .status-done {
            opacity: 0.5;
            text-decoration: line-through;
            filter: grayscale(0.8);
        }

        .btn-icon {
            padding: 8px;
            border-radius: 10px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-icon:hover {
            background-color: #f1f5f9;
            transform: scale(1.1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide {
            animation: slideIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-5px); }
        }
        .save-indicator {
            animation: fadeOut 2s ease-out forwards;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 20px;
        }
        
        input:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="bg-[#fdfdff] min-h-screen p-4 md:p-8 text-slate-700">

    <div class="max-w-2xl mx-auto bg-white rounded-[2.5rem] shadow-2xl shadow-blue-900/5 border border-slate-100 overflow-hidden">
        <!-- Header -->
        <div class="p-8 bg-white border-b border-slate-50">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-blue-500 rounded-2xl text-white shadow-lg shadow-blue-200">
                        <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Task Tree</h1>
                        <div id="saveStatus" class="text-xs text-emerald-500 font-semibold uppercase tracking-wider h-4 opacity-0 flex items-center gap-1">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17L4 12"></path></svg>
                            Saved to browser
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2 p-2 bg-slate-50 rounded-3xl border border-slate-200 focus-within:bg-white focus-within:border-blue-300 transition-all shadow-inner">
                <input type="text" id="mainTaskInput" placeholder="What's your big goal?" 
                    class="flex-1 px-5 py-3 bg-transparent border-none outline-none text-lg text-slate-700 placeholder:text-slate-400 font-medium">
                <button onclick="addMainTask()" 
                    class="bg-blue-600 text-white px-8 py-3 rounded-[1.25rem] font-bold hover:bg-blue-700 transition-all shadow-md active:scale-95 text-lg">
                    Add
                </button>
            </div>
        </div>

        <!-- Task List Container -->
        <div id="taskList" class="p-8 space-y-3 min-h-[350px]">
            <!-- Tasks injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden py-24 px-8 text-center">
            <div class="w-20 h-20 bg-blue-50 rounded-[2rem] flex items-center justify-center mx-auto mb-6 border border-blue-100/50">
                <svg class="text-blue-200" width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
            </div>
            <p class="text-slate-500 text-xl font-bold mb-1">Your tree is resting!</p>
            <p class="text-slate-400">Add a task to see it grow.</p>
        </div>
    </div>

    <script>
        let tasks = [];
        let activeInputId = null; 
        const STORAGE_KEY = 'task-tree-v8';

        window.onload = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            tasks = saved ? JSON.parse(saved) : [];
            renderTasks();
        };

        function sortTasks(list) {
            const order = { 'doing': 1, 'default': 2, 'done': 3 };
            list.sort((a, b) => order[a.status] - order[b.status]);
            list.forEach(task => { if (task.subtasks) sortTasks(task.subtasks); });
        }

        function showSaveIndicator() {
            const el = document.getElementById('saveStatus');
            el.classList.remove('save-indicator');
            void el.offsetWidth;
            el.classList.add('save-indicator', 'opacity-100');
        }

        function saveAndRefresh() {
            sortTasks(tasks);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            renderTasks();
            showSaveIndicator();
        }

        function createTask(text) {
            return {
                id: 'id-' + Date.now() + '-' + Math.floor(Math.random() * 1000),
                text: text,
                status: 'default',
                subtasks: []
            };
        }

        function addMainTask() {
            const input = document.getElementById('mainTaskInput');
            const text = input.value.trim();
            if (!text) return;
            tasks.push(createTask(text));
            input.value = '';
            saveAndRefresh();
        }

        function findTask(list, id, callback) {
            for (let i = 0; i < list.length; i++) {
                if (list[i].id === id) {
                    callback(list, i);
                    return true;
                }
                if (list[i].subtasks && findTask(list[i].subtasks, id, callback)) return true;
            }
            return false;
        }

        window.toggleStatus = function(id) {
            findTask(tasks, id, (list, index) => {
                const s = list[index].status;
                list[index].status = s === 'default' ? 'doing' : s === 'doing' ? 'done' : 'default';
            });
            saveAndRefresh();
        };

        window.deleteTask = function(id) {
            findTask(tasks, id, (list, index) => {
                list.splice(index, 1);
            });
            saveAndRefresh();
        };

        window.showSubtaskInput = function(id) {
            activeInputId = id;
            renderTasks();
            setTimeout(() => {
                const el = document.getElementById('inline-input-' + id);
                if (el) el.focus();
            }, 10);
        };

        window.handleInlineSubmit = function(e, parentId) {
            if (e.key === 'Enter') {
                const text = e.target.value.trim();
                if (text) {
                    findTask(tasks, parentId, (list, index) => {
                        list[index].subtasks.push(createTask(text));
                    });
                    activeInputId = null;
                    saveAndRefresh();
                } else {
                    activeInputId = null;
                    renderTasks();
                }
            } else if (e.key === 'Escape') {
                activeInputId = null;
                renderTasks();
            }
        };

        function generateTaskHtml(task, isSubtask = false, isParentDoing = false) {
            const isDoing = task.status === 'doing' || isParentDoing;
            const isDone = task.status === 'done';
            
            const pillColor = task.status === 'doing' ? 'bg-blue-600 text-white' : 
                               isDone ? 'bg-slate-200 text-slate-500' : 'bg-slate-100 text-slate-400';
            const label = task.status === 'doing' ? 'DOING' : isDone ? 'DONE' : 'NEXT';

            return `
                <div class="task-node animate-slide ${isDoing ? 'branch-highlight' : ''}">
                    ${isSubtask ? '<div class="connector-line"></div>' : ''}
                    <div class="flex items-center gap-3 p-4 rounded-2xl border border-slate-100 bg-white hover:border-blue-200 hover:shadow-lg hover:shadow-blue-500/5 transition-all ${task.status === 'doing' ? 'status-doing' : ''} ${isDone ? 'status-done' : ''}">
                        
                        ${!isSubtask ? `
                            <button onclick="toggleStatus('${task.id}')" 
                                class="text-[11px] px-3 py-1.5 rounded-full font-bold ${pillColor} min-w-[65px] uppercase shadow-sm active:scale-95 transition-all">
                                ${label}
                            </button>
                        ` : ''}

                        <div class="flex-1 min-w-0 px-2 py-1">
                            <span class="text-slate-700 text-lg font-semibold truncate block">
                                ${task.text}
                            </span>
                        </div>

                        <div class="flex gap-1 shrink-0">
                            <button onclick="showSubtaskInput('${task.id}')" class="btn-icon text-blue-500 hover:bg-blue-50" title="Add step">
                                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                            </button>
                            <button onclick="deleteTask('${task.id}')" class="btn-icon text-slate-300 hover:text-red-500 hover:bg-red-50" title="Remove">
                                <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>

                    ${(task.subtasks.length > 0 || activeInputId === task.id) ? `
                        <div class="subtask-container">
                            ${task.subtasks.map(st => generateTaskHtml(st, true, isDoing)).join('')}
                            ${activeInputId === task.id ? `
                                <div class="animate-slide relative">
                                    <div class="connector-line"></div>
                                    <div class="p-2 bg-blue-50 rounded-2xl border border-blue-100 mt-2">
                                        <input type="text" id="inline-input-${task.id}" 
                                            placeholder="What's next?"
                                            onkeydown="handleInlineSubmit(event, '${task.id}')"
                                            onblur="if(!this.value) { activeInputId = null; renderTasks(); }"
                                            class="w-full px-4 py-2 text-md rounded-xl bg-white border border-blue-200 outline-none shadow-sm font-medium">
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderTasks() {
            const listEl = document.getElementById('taskList');
            const emptyEl = document.getElementById('emptyState');
            
            if (tasks.length === 0) {
                listEl.innerHTML = '';
                emptyEl.classList.remove('hidden');
            } else {
                emptyEl.classList.add('hidden');
                listEl.innerHTML = tasks.map(t => generateTaskHtml(t)).join('');
            }
        }

        document.getElementById('mainTaskInput').onkeypress = (e) => {
            if (e.key === 'Enter') addMainTask();
        };
    </script>
</body>
</html>
